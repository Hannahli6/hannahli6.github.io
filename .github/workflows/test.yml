name: test

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: khan/pull-request-comment-trigger@v1.1.0
      id: check
      with:
          trigger: 'testing'
          reaction: rocket
    - run: curl "https://dog.ceo/api/breeds/image/random"
    - run: 'echo Testing'
      if: steps.check.outputs.triggered == 'true'

